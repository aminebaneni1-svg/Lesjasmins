<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Les Jasmins — QR codes des tables</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@600&family=Work+Sans:wght@500;600&display=swap" rel="stylesheet">
<style>
  body{ font-family:'Work Sans', sans-serif; background:#FAF7EF; margin:0; padding:20px; }
  h1{ font-family:'Cormorant Garamond', serif; color:#4A2E5C; text-align:center; }
  .setup{ max-width:420px; margin:0 auto 24px; text-align:center; }
  .setup input{ width:100%; padding:12px; font-size:15px; border:2px solid #4A2E5C; border-radius:8px; margin-bottom:10px;}
  .setup button{ background:#4A2E5C; color:white; border:none; padding:12px 24px; border-radius:8px; font-weight:600; cursor:pointer; }
  .grid{ display:grid; grid-template-columns:repeat(auto-fill, minmax(160px, 1fr)); gap:16px; }
  .qr-card{ background:white; border:1px solid #F1ECDF; border-radius:12px; padding:12px; text-align:center; page-break-inside:avoid; }
  .qr-card img{ width:100%; max-width:150px; }
  .qr-card .label{ font-family:'Cormorant Garamond', serif; font-size:20px; font-weight:600; color:#4A2E5C; margin-top:6px; }
  @media print{ .setup{ display:none; } }
</style>
</head>
<body>
  <h1>✿ Les Jasmins — QR codes</h1>
  <div class="setup">
    <p>Collez ici l'adresse de votre app client une fois en ligne (ex: https://lesjasmins.netlify.app/client.html)</p>
    <input id="baseUrl" placeholder="https://votre-site.netlify.app/client.html">
    <input id="tableCount" type="number" value="30" placeholder="Nombre de tables">
    <button onclick="generate()">Générer les QR codes</button>
    <button onclick="window.print()">Imprimer</button>
  </div>
  <div class="grid" id="grid"></div>

<script>
  function generate() {
    const base = document.getElementById("baseUrl").value.trim();
    const count = parseInt(document.getElementById("tableCount").value) || 30;
    if (!base) { alert("Merci de coller l'adresse de votre app client."); return; }
    const grid = document.getElementById("grid");
    grid.innerHTML = "";
    for (let i = 1; i <= count; i++) {
      const url = `${base}?table=${i}`;
      const qrImg = `https://api.qrserver.com/v1/create-qr-code/?size=300x300&data=${encodeURIComponent(url)}`;
      const card = document.createElement("div");
      card.className = "qr-card";
      card.innerHTML = `<img src="${qrImg}" alt="QR table ${i}"><div class="label">Table ${i}</div>`;
      grid.appendChild(card);
    }
  }
</script>
</body>
</html>
